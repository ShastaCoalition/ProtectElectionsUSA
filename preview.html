<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #0F1923;
    color: #C8D8E8;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 24px;
    text-align: center;
  }
  .flag-wrap {
    width: min(480px, 90vw);
    margin-bottom: 40px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.7), 0 2px 16px rgba(244,166,35,0.18);
    animation: floatIn 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .flag-wrap img {
    width: 100%;
    display: block;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(28px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 7vw, 4rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
    animation: fadeUp 0.9s 0.2s both;
    margin-bottom: 12px;
  }
  .cal  { color: #5A7A5A; }
  .off  { color: #F4A623; }
  .sub {
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    color: #7A8FA6;
    font-weight: 500;
    letter-spacing: 0.02em;
    animation: fadeUp 0.9s 0.3s both;
    margin-bottom: 28px;
  }
  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, #4a6741, #F4A623);
    border-radius: 2px;
    margin: 0 auto 28px;
    animation: fadeUp 0.9s 0.35s both;
  }
  .pills {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    margin-bottom: 36px;
    animation: fadeUp 0.9s 0.4s both;
  }
  .pill {
    background: #1C2B3A;
    border: 1px solid rgba(244,166,35,0.2);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #C8D8E8;
    letter-spacing: 0.03em;
    display: flex; align-items: center; gap: 6px;
  }
  .pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #F4A623; flex-shrink: 0;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #F4A623;
    color: #0F1923;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    padding: 16px 40px;
    border-radius: 8px;
    text-transform: uppercase;
    box-shadow: 0 4px 24px rgba(244,166,35,0.35);
    transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
    animation: fadeUp 0.9s 0.5s both;
  }
  .cta:hover {
    background: #FFBA45;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(244,166,35,0.5);
  }
  .cta-note {
    margin-top: 14px;
    font-size: 0.78rem;
    color: #7A8FA6;
    letter-spacing: 0.02em;
    animation: fadeUp 0.9s 0.6s both;
  }
  .footer {
    margin-top: 52px;
    font-size: 0.72rem;
    color: #3A5068;
    letter-spacing: 0.06em;
    animation: fadeUp 0.9s 0.7s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
